name: 💡 Feature Request
description: Suggest a new parameter, DSP feature, or UI improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: e.g. "I wish I could modulate the Morph parameter with an LFO…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
